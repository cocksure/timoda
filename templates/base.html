<!DOCTYPE html>
<html lang="ru">
<head>
<style>
  #page-loader{position:fixed;inset:0;background:#fafaf7;z-index:99999;display:flex;align-items:center;justify-content:center;transition:opacity .35s ease,visibility .35s}
  #page-loader.done{opacity:0;visibility:hidden}
  .pl-ring{width:40px;height:40px;border:3px solid #E5E0D8;border-top-color:#3E2C1A;border-radius:50%;animation:pl-spin .7s linear infinite}
  @keyframes pl-spin{to{transform:rotate(360deg)}}
</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Timoda — Трикотажные изделия{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Премиальный трикотаж — свитеры, кардиганы, платья. Доставка по всему Узбекистану.{% endblock %}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">

  {% block extra_css %}{% endblock %}
</head>
<body>

<div id="page-loader"><div class="pl-ring"></div></div>

{% include 'includes/navbar.html' %}

{% include 'includes/messages.html' %}

<main>
  {% block content %}{% endblock %}
</main>

{% include 'includes/footer.html' %}

<!-- Cart Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="cartToast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body">
        <i class="bi bi-bag-check-fill text-success me-2"></i>
        <span id="cartToastMsg">Товар добавлен в корзину</span>
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- HTMX -->
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
{% load static %}
<script src="{% static 'js/main.js' %}"></script>

{% block extra_js %}{% endblock %}
</body>
</html>
