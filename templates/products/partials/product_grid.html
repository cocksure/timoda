{% if products %}
<div class="row g-3" id="product-grid">
  {% for product in products %}
  {% include 'products/partials/product_card.html' with product=product %}
  {% endfor %}
</div>
{% else %}
<div class="text-center py-5">
  <i class="bi bi-search fs-1 text-muted"></i>
  <p class="text-muted mt-3">Товары не найдены. Попробуйте изменить фильтры.</p>
  <a href="{% url 'products:list' %}" class="btn btn-outline-dark">Сбросить фильтры</a>
</div>
{% endif %}
