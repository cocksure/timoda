{% extends 'dashboard/base.html' %}
{% block title %}Подтверждение удаления{% endblock %}
{% block page_title %}Удаление{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="dash-card text-center py-4">
      <div class="mb-3" style="font-size:3rem;color:#dc3545;">
        <i class="bi bi-trash3"></i>
      </div>
      <h5 class="fw-semibold mb-2">Вы уверены?</h5>
      <p class="text-muted mb-4">
        Удалить <strong>{{ name }}</strong>? Это действие необратимо.
      </p>
      <div class="d-flex gap-2 justify-content-center">
        <a href="javascript:history.back()" class="btn btn-outline-secondary">Отмена</a>
        <form method="POST">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Удалить</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
