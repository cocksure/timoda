{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Регистрация — Timoda{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-sm-10 col-md-7 col-lg-5">
      <div class="auth-card">
        <!-- Steps indicator -->
        <div class="otp-steps mb-4">
          <div class="otp-step active"><span>1</span><small>Номер</small></div>
          <div class="otp-step-line"></div>
          <div class="otp-step"><span>2</span><small>Код</small></div>
          <div class="otp-step-line"></div>
          <div class="otp-step"><span>3</span><small>Данные</small></div>
        </div>

        <div class="text-center mb-4">
          <h2 class="auth-title">Регистрация</h2>
          <p class="text-muted">Введите номер телефона — отправим код подтверждения</p>
        </div>

        <form method="POST">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-dark w-100 btn-lg mt-2">
            Получить код <i class="bi bi-send ms-1"></i>
          </button>
        </form>

        <p class="text-center mt-3 text-muted small">
          Уже есть аккаунт? <a href="{% url 'accounts:login' %}">Войти</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
