{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Войти — Timoda{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-sm-10 col-md-7 col-lg-5">
      <div class="auth-card">
        <div class="text-center mb-4">
          <h2 class="auth-title">Добро пожаловать</h2>
          <p class="text-muted">Войдите в свой аккаунт</p>
        </div>
        <form method="POST">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-dark w-100 btn-lg mt-2">Войти</button>
        </form>
        <p class="text-center mt-3 text-muted small">
          Нет аккаунта? <a href="{% url 'accounts:register' %}">Зарегистрироваться</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
