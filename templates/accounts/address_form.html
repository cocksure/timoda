{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ title }} — Timoda{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="auth-card">
        <h2 class="auth-title mb-4">{{ title }}</h2>
        <form method="POST">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-dark">Сохранить</button>
            <a href="{% url 'accounts:addresses' %}" class="btn btn-outline-secondary">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
